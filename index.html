<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開團成本追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5fa;--bg2:#f7f7fc;--bg3:#f0f0f8;
  --white:#ffffff;
  --border:#e0e0ea;--border2:#ebebf4;
  --text:#2d2d35;--text2:#9090a8;--text3:#aaaabc;
  --green:#2a8a5a;--green-light:#e2f5ec;--green-bd:#5cc896;
  --amber:#a06010;--amber-light:#fef3e2;--amber-bd:#f0a830;
  --red:#d04040;--blue:#5b7cf6;
  --radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;padding:28px 24px 60px}
h1{font-size:20px;font-weight:700;color:#1a1a24;margin-bottom:3px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:6px}
.slbl{font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-weight:500}
.save-notice{font-size:11px;color:var(--text3);margin-bottom:20px;display:flex;align-items:center;gap:6px}
.save-dot{width:7px;height:7px;border-radius:50%;background:#b8e0c8;display:inline-block;flex-shrink:0}

/* TABS */
.tabs-bar{display:flex;align-items:flex-end;border-bottom:1.5px solid var(--border);overflow-x:auto}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font-size:13px;padding:8px 16px;cursor:pointer;white-space:nowrap;margin-bottom:-1.5px;font-family:'Noto Sans TC',sans-serif;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom:2px solid var(--blue);background:var(--bg2)}
.tab-add{background:none;border:1.5px dashed var(--border);border-radius:var(--radius);color:var(--text3);font-size:12px;padding:4px 12px;cursor:pointer;margin-left:8px;margin-bottom:4px;font-family:'Noto Sans TC',sans-serif}
.tab-add:hover{color:var(--blue);border-color:var(--blue)}

/* PANELS */
.panel{display:none;background:var(--bg2);border:1.5px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:16px}
.panel.active{display:block}
.panel-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.panel-title{background:none;border:none;border-bottom:1.5px dashed var(--border);color:var(--text);font-size:15px;font-weight:600;font-family:'Noto Sans TC',sans-serif;padding:2px 4px;min-width:80px}
.panel-title:focus{outline:none;border-bottom-color:var(--blue)}
.cost-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.cost-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 12px;display:flex;flex-direction:column;gap:4px}
.cost-card label{font-size:11px;color:var(--text2);letter-spacing:.04em;font-weight:500}
.cost-card input,.cost-card select{background:var(--bg3);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:4px 8px}
.cost-card input:focus,.cost-card select:focus{outline:none;border-color:var(--blue);background:var(--white)}
.cost-hint{font-size:11px;color:var(--text2);margin-top:4px}
.cost-hint strong{color:var(--text);font-family:'DM Mono',monospace}
.head-btns{display:flex;align-items:center;gap:6px}
.del-sheet-btn,.reset-btn{background:none;border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:12px;padding:4px 10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.del-sheet-btn:hover{color:var(--red);border-color:var(--red)}
.reset-btn:hover{color:var(--amber);border-color:var(--amber-bd)}

/* LEGEND */
.legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%}

/* TABLE */
.tbl-wrap{overflow-x:auto;margin-bottom:8px}
table{width:100%;border-collapse:collapse;min-width:940px}
th{font-size:11px;font-weight:600;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:1.5px solid var(--border2);white-space:nowrap;background:var(--bg3)}
th.tr,td.tr{text-align:right}
td{padding:6px 8px;border-bottom:1px solid var(--border2);vertical-align:middle;font-size:13px;background:var(--white)}
.sub-row td{background:var(--bg2);font-size:11px;color:var(--text3);padding:3px 8px;border-bottom:1px solid var(--border2)}
.sub-row:hover td{background:var(--bg3)}
tr:not(.sub-row):hover td{background:#f4f4fb}
.row-decided td:first-child{border-left:3px solid var(--green-bd)}
.row-pending td:first-child{border-left:3px solid var(--amber-bd)}
.row-empty td:first-child{border-left:3px solid var(--border)}
.sub-d{border-left:3px solid var(--green-bd)!important}
.sub-p{border-left:3px solid var(--amber-bd)!important}
.sub-e{border-left:3px solid var(--border)!important}

select.inline{font-size:12px;padding:3px 5px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-family:'Noto Sans TC',sans-serif}
select.inline:focus{outline:none;border-color:var(--blue)}
.ci{width:64px;font-size:12px;text-align:right;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 6px;color:var(--text);font-family:'DM Mono',monospace}
.ci:focus{outline:none;border-color:var(--blue);background:var(--white)}
.vi{font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 6px;color:var(--text);width:100px;font-family:'Noto Sans TC',sans-serif}
.vi:focus{outline:none;border-color:var(--blue);background:var(--white)}
.editable{outline:none;border-bottom:1px dashed transparent;font-weight:500;transition:border-color .15s}
.editable:focus{border-bottom-color:var(--border)}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;white-space:nowrap}
.bd{background:var(--green-light);color:var(--green)}
.bp{background:var(--amber-light);color:var(--amber)}
.be{background:var(--bg3);color:var(--text3)}
.net-pos{color:var(--green);font-weight:600}
.net-neg{color:var(--red);font-weight:600}

.artist-wrap{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.artist-mgmt-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;padding:2px 7px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.artist-mgmt-btn:hover{color:var(--blue);border-color:var(--blue)}
.add-row-btn{display:flex;align-items:center;gap:8px;background:none;border:1.5px dashed var(--border);border-radius:var(--radius);color:var(--text3);font-size:13px;padding:7px 14px;cursor:pointer;width:100%;margin-top:8px;font-family:'Noto Sans TC',sans-serif}
.add-row-btn:hover{border-color:var(--blue);color:var(--blue)}
.del-btn{background:none;border:none;color:var(--border);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;line-height:1}
.del-btn:hover{color:var(--red)}

/* MISC */
.misc-section{margin-top:14px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px}
.misc-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.misc-rows{display:flex;flex-direction:column;gap:6px}
.misc-row{display:flex;align-items:center;gap:8px}
.misc-name{font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);width:140px;font-family:'Noto Sans TC',sans-serif}
.misc-amt{width:90px;font-size:12px;text-align:right;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-family:'DM Mono',monospace}
.misc-name:focus,.misc-amt:focus{outline:none;border-color:var(--blue);background:var(--white)}
.misc-lbl{font-size:12px;color:var(--text3)}
.misc-total{font-size:12px;color:var(--text2);margin-top:10px;padding-top:8px;border-top:1px solid var(--border2)}
.misc-total strong{color:var(--text);font-family:'DM Mono',monospace}
.add-misc-btn{background:none;border:1.5px dashed var(--border);border-radius:var(--radius);color:var(--text3);font-size:12px;padding:4px 12px;cursor:pointer;margin-top:8px;font-family:'Noto Sans TC',sans-serif;display:block}
.add-misc-btn:hover{color:var(--blue);border-color:var(--blue)}

/* SUMMARY */
.sheet-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.gstat{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center}
.gstat .lbl{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.gstat .val{font-size:19px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
.grand-section{margin-top:28px}
.grand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.grand-stat{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center}
.grand-stat .lbl{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.grand-stat .val{font-size:21px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.prog-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.prog-hdr{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}
.prog-bg{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden}
.prog-fill{height:8px;border-radius:4px;transition:width .4s}
.prog-note{font-size:12px;color:var(--text2);margin-top:8px}
.divider{border:none;border-top:1.5px solid var(--border);margin:20px 0}

/* ARTIST EDITOR */
.artist-editor{display:none;position:fixed;inset:0;background:rgba(60,60,80,.3);z-index:100;align-items:center;justify-content:center}
.artist-editor.open{display:flex}
.ae-box{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:20px;min-width:300px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(80,80,120,.1)}
.ae-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.ae-lbl{font-size:11px;color:var(--text2);margin-bottom:10px}
.ae-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ae-name{flex:1;font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:'Noto Sans TC',sans-serif}
.ae-fee{width:80px;font-size:13px;text-align:right;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:'DM Mono',monospace}
.ae-name:focus,.ae-fee:focus{outline:none;border-color:var(--blue);background:var(--white)}
.ae-add{background:none;border:1.5px dashed var(--border);border-radius:var(--radius);color:var(--text3);font-size:12px;padding:5px 12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;width:100%;margin-top:4px}
.ae-add:hover{color:var(--blue);border-color:var(--blue)}
.ae-footer{display:flex;justify-content:flex-end;margin-top:16px;border-top:1px solid var(--border2);padding-top:12px}
.ae-close{background:var(--blue);border:none;border-radius:var(--radius);color:#fff;font-size:13px;padding:6px 22px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:500}
.ae-close:hover{background:#4a6ae0}
</style>
</head>
<body>

<div class="artist-editor" id="artist-editor">
  <div class="ae-box">
    <div class="ae-title">編輯美工選項</div>
    <div class="ae-lbl">名稱 · 稿費</div>
    <div id="ae-rows"></div>
    <button class="ae-add" onclick="aeAddRow()">＋ 加美工</button>
    <div class="ae-footer"><button class="ae-close" onclick="closeArtistEditor()">完成</button></div>
  </div>
</div>

<h1>開團成本追蹤</h1>
<p class="subtitle">每張稿圖獨立分頁 · 數據自動儲存於本機</p>
<div class="save-notice"><span class="save-dot"></span><span id="save-label">載入中...</span></div>

<div class="tabs-bar" id="tabs-bar"></div>
<div id="panels-wrap"></div>

<div class="grand-section">
  <div class="divider"></div>
  <div class="slbl">所有稿圖合計</div>
  <div class="grand-grid" id="grand-stats"></div>
  <div class="prog-wrap" id="grand-prog"></div>
</div>

<script>
const SAVE_KEY='doujin_cost_tracker_v7';

const defaultSheets=[{
  title:"稿圖 1",feeBase:0,feeMode:"commercial",
  miscFees:[{name:"打樣費",amt:0},{name:"打樣郵費",amt:0},{name:"代發費",amt:0}],
  items:[
    {g:"色紙",spec:"14x21cm 觸感膜",artists:[{n:"秋莜",fee:0},{n:"里小拾",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"雙面明信片",spec:"",artists:[{n:"深入淺草",fee:0},{n:"里小拾",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"雙面拍立得 A",spec:"兩款之一",artists:[{n:"深入淺草",fee:0},{n:"里小拾",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"雙面拍立得 B",spec:"兩款之二",artists:[{n:"深入淺草",fee:0},{n:"里小拾",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"透卡",spec:"",artists:[{n:"—（待填）",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"雙面鐳射票 A",spec:"",artists:[{n:"里小拾",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"雙面鐳射票 B",spec:"",artists:[{n:"里小拾",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"立牌底座",spec:"",artists:[{n:"唯裳",fee:0},{n:"里小拾",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"外殼（嘉嘉）",spec:"8cm+3.5cm框+小尾巴",artists:[{n:"里小拾",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"光柵卡（嘉嘉）",spec:"",artists:[{n:"滴滴ONE",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"外殼（翎翎）",spec:"",artists:[{n:"里小拾",fee:0},{n:"（其他）",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
    {g:"光柵卡（翎翎）",spec:"",artists:[{n:"滴滴ONE",fee:0},{n:"（其他）",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""},
  ]
}];

function loadData(){
  try{const r=localStorage.getItem(SAVE_KEY);if(r)return JSON.parse(r);}catch(e){}
  return JSON.parse(JSON.stringify(defaultSheets));
}
function saveData(){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify(sheets));
    document.getElementById('save-label').textContent='已自動儲存 ✓';
  }catch(e){
    document.getElementById('save-label').textContent='儲存失敗（需本地開啟檔案）';
  }
}

let sheets=loadData();
let activeTab=0;
let aeTarget={si:0,ii:0};

function feeMult(s){return s.feeMode==='buyout'?3:2}
function sheetFee(s){return(s.feeBase||0)*feeMult(s)}
function itemArtistFee(it){if(it.sel===null)return 0;const a=it.artists[it.sel];return a?a.fee:0}
function itemCommercial(it,m){return itemArtistFee(it)*m}
function itemPrintCost(it){return(it.print||0)*(it.qty||0)}
function itemShipping(it){return it.shipping||0}
function itemRev(it){return(it.price||0)*(it.qty||0)}
function itemNet(it,m){return itemRev(it)-itemCommercial(it,m)-itemPrintCost(it)-itemShipping(it)}
function sheetMisc(s){return(s.miscFees||[]).reduce((t,f)=>t+(f.amt||0),0)}
function sheetRev(s){return s.items.reduce((t,it)=>t+itemRev(it),0)}
function sheetCost(s){const m=feeMult(s);return sheetFee(s)+s.items.reduce((t,it)=>t+itemCommercial(it,m)+itemPrintCost(it)+itemShipping(it),0)+sheetMisc(s)}
function status(it){if(it.sel===null)return'p';if(!it.artists[it.sel].fee)return'e';return'd'}
function fmt(n){const r=Math.round(n*100)/100;return Number.isInteger(r)?String(r):r.toFixed(2).replace(/\.?0+$/,'')}

function render(){renderTabs();renderPanels();calcGrand()}

function renderTabs(){
  document.getElementById('tabs-bar').innerHTML=
    sheets.map((s,i)=>`<button class="tab-btn${i===activeTab?' active':''}" onclick="switchTab(${i})">${s.title}</button>`).join('')+
    `<button class="tab-add" onclick="addSheet()">＋ 新稿圖</button>`;
}

function renderPanels(){
  document.getElementById('panels-wrap').innerHTML=sheets.map((s,si)=>{
    const mult=feeMult(s),feeTot=sheetFee(s),miscTot=sheetMisc(s);
    const rev=sheetRev(s),cost=sheetCost(s),profit=rev-cost,ok=profit>=0;

    const rows=s.items.map((it,ii)=>{
      const st=status(it);
      const rc=st==='d'?'row-decided':st==='p'?'row-pending':'row-empty';
      const sb=st==='d'?'sub-d':st==='p'?'sub-p':'sub-e';
      const fee=itemArtistFee(it),commercial=itemCommercial(it,mult);
      const printCost=itemPrintCost(it),shipping=itemShipping(it);
      const rev2=itemRev(it),net=itemNet(it,mult),netOk=net>=0;
      const hasData=rev2||commercial||printCost||shipping;
      const badge=st==='d'?'<span class="badge bd">已選</span>':st==='p'?'<span class="badge bp">待定</span>':'<span class="badge be">待填</span>';
      const opts=it.artists.map((ar,ai)=>`<option value="${ai}"${it.sel===ai?' selected':''}>${ar.n}</option>`).join('')
        +`<option value="null"${it.sel===null?' selected':''}>— 未選 —</option>`;
      return`<tr class="${rc}">
        <td><span class="editable" contenteditable="true" onblur="updateName(${si},${ii},this.innerText)">${it.g}</span>${it.spec?`<div style="font-size:11px;color:#aaaabc;margin-top:2px">${it.spec}</div>`:''}</td>
        <td><div class="artist-wrap">
          <select class="inline" onchange="selArtist(${si},${ii},this.value)">${opts}</select>
          <button class="artist-mgmt-btn" onclick="openArtistEditor(${si},${ii})">編輯</button>
        </div></td>
        <td class="tr" style="font-family:'DM Mono',monospace">${fee?'$'+fmt(fee):'—'}</td>
        <td><input class="vi" type="text" placeholder="廠商名稱" value="${it.vendor||''}" onchange="updItem(${si},${ii},'vendor',this.value)"></td>
        <td><input class="ci" type="number" min="0" step="any" value="${it.price||''}" placeholder="0" onchange="updItem(${si},${ii},'price',this.value)"></td>
        <td><input class="ci" type="number" min="0" step="any" value="${it.qty||''}" placeholder="0" onchange="updItem(${si},${ii},'qty',this.value)"></td>
        <td><input class="ci" type="number" min="0" step="any" value="${it.print||''}" placeholder="0" onchange="updItem(${si},${ii},'print',this.value)"></td>
        <td><input class="ci" type="number" min="0" step="any" value="${it.shipping||''}" placeholder="0" onchange="updItem(${si},${ii},'shipping',this.value)"></td>
        <td class="tr" style="font-family:'DM Mono',monospace">${rev2?'$'+fmt(rev2):'—'}</td>
        <td class="tr ${netOk?'net-pos':'net-neg'}">${hasData?(netOk?'+':'-')+' $'+fmt(Math.abs(net)):'—'}</td>
        <td>${badge}</td>
        <td><button class="del-btn" onclick="delItem(${si},${ii})" title="刪除">✕</button></td>
      </tr>
      <tr class="sub-row">
        <td class="${sb}" colspan="2">↳ 商用費（稿費 ×${mult}）</td>
        <td class="tr" colspan="2" style="font-family:'DM Mono',monospace">${commercial?'$'+fmt(commercial):'—'}</td>
        <td colspan="2">↳ 印刷成本（@$${fmt(it.print||0)} × ${fmt(it.qty||0)}）</td>
        <td class="tr" style="font-family:'DM Mono',monospace">${printCost?'$'+fmt(printCost):'—'}</td>
        <td class="tr" style="font-family:'DM Mono',monospace">${shipping?'$'+fmt(shipping):'—'}</td>
        <td colspan="3"></td>
      </tr>`;
    }).join('');

    const miscRows=(s.miscFees||[]).map((f,fi)=>`
      <div class="misc-row">
        <input class="misc-name" type="text" value="${f.name}" onchange="updMisc(${si},${fi},'name',this.value)" placeholder="費用名稱">
        <span class="misc-lbl">$</span>
        <input class="misc-amt" type="number" min="0" step="any" value="${f.amt||''}" placeholder="0" onchange="updMisc(${si},${fi},'amt',this.value)">
        <button class="del-btn" onclick="delMisc(${si},${fi})">✕</button>
      </div>`).join('');

    return`<div class="panel${si===activeTab?' active':''}" id="panel-${si}">
      <div class="panel-head">
        <div style="display:flex;align-items:center;gap:8px">
          <input class="panel-title" value="${s.title}" onchange="updTitle(${si},this.value)">
          <div class="head-btns">
            <button class="reset-btn" onclick="resetSheet(${si})">↺ 清除數據</button>
            ${sheets.length>1?`<button class="del-sheet-btn" onclick="delSheet(${si})">✕ 刪除</button>`:''}
          </div>
        </div>
        <div class="cost-row">
          <div class="cost-card">
            <label>稿費 ($)</label>
            <input type="number" min="0" step="any" value="${s.feeBase||''}" placeholder="0" style="width:110px" onchange="updSheet(${si},'feeBase',this.value)">
          </div>
          <div class="cost-card">
            <label>稿費模式</label>
            <select style="width:130px" onchange="updSheet(${si},'feeMode',this.value)">
              <option value="commercial"${s.feeMode==='commercial'?' selected':''}>商用 ×2</option>
              <option value="buyout"${s.feeMode==='buyout'?' selected':''}>買斷 ×3</option>
            </select>
            <div class="cost-hint">稿費小計：<strong>$${fmt(feeTot)}</strong></div>
          </div>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#5cc896"></div>已選定</div>
        <div class="legend-item"><div class="dot" style="background:#f0a830"></div>仲諗緊</div>
      </div>

      <div class="tbl-wrap"><table>
        <thead><tr>
          <th style="min-width:95px">品項</th><th>選擇美工</th>
          <th class="tr">稿費</th><th>廠商</th>
          <th class="tr">售價($)</th><th class="tr">數量</th>
          <th class="tr">印刷費@</th><th class="tr">大貨郵費</th>
          <th class="tr">收入</th><th class="tr">淨收益</th>
          <th>狀態</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <button class="add-row-btn" onclick="addItem(${si})">＋ 加新品項</button>

      <div class="misc-section">
        <div class="misc-title">全局雜費</div>
        <div class="misc-rows">${miscRows}</div>
        <button class="add-misc-btn" onclick="addMisc(${si})">＋ 加費用</button>
        <div class="misc-total">雜費合計：<strong>$${fmt(miscTot)}</strong></div>
      </div>

      <div class="sheet-summary">
        <div class="gstat"><div class="lbl">此圖總成本</div><div class="val">$${fmt(cost)}</div></div>
        <div class="gstat"><div class="lbl">預計收入</div><div class="val">$${fmt(rev)}</div></div>
        <div class="gstat"><div class="lbl">盈虧</div><div class="val" style="color:${ok?'#2a8a5a':'#d04040'}">${ok?'+':''}$${fmt(profit)}</div></div>
      </div>
    </div>`;
  }).join('');
}

function calcGrand(){
  const tc=sheets.reduce((t,s)=>t+sheetCost(s),0);
  const tr=sheets.reduce((t,s)=>t+sheetRev(s),0);
  const profit=tr-tc,ok=profit>=0;
  const pct=tc>0?Math.min((tr/tc)*100,100):0;
  document.getElementById('grand-stats').innerHTML=`
    <div class="grand-stat"><div class="lbl">總成本</div><div class="val">$${fmt(tc)}</div></div>
    <div class="grand-stat"><div class="lbl">預計收入</div><div class="val">$${fmt(tr)}</div></div>
    <div class="grand-stat"><div class="lbl">盈虧</div><div class="val" style="color:${ok?'#2a8a5a':'#d04040'}">${ok?'+':''}$${fmt(profit)}</div></div>`;
  document.getElementById('grand-prog').innerHTML=`
    <div class="prog-hdr"><span>回本進度</span><span style="color:#3a3a50">${Math.round(pct)}%</span></div>
    <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${ok?'#5cc896':'#e05050'}"></div></div>
    <div class="prog-note">${profit<0
      ?`仲差 <strong style="color:#d04040">$${fmt(Math.abs(profit))}</strong> 先回本`
      :`已超出成本 <strong style="color:#2a8a5a">$${fmt(profit)}</strong>，恭喜！`}</div>`;
}

function switchTab(i){activeTab=i;render()}
function addSheet(){
  sheets.push({title:`稿圖 ${sheets.length+1}`,feeBase:0,feeMode:'commercial',
    miscFees:[{name:"打樣費",amt:0},{name:"打樣郵費",amt:0},{name:"代發費",amt:0}],
    items:[{g:"新品項",spec:"",artists:[{n:"（美工名）",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""}]});
  activeTab=sheets.length-1;render();saveData();
}
function delSheet(si){if(sheets.length<2)return;sheets.splice(si,1);activeTab=Math.min(activeTab,sheets.length-1);render();saveData()}
function updTitle(si,v){sheets[si].title=v;renderTabs();saveData()}
function updSheet(si,f,v){sheets[si][f]=f==='feeBase'?parseFloat(v)||0:v;render();saveData()}
function selArtist(si,ii,v){sheets[si].items[ii].sel=v==='null'?null:parseInt(v);render();saveData()}
function updItem(si,ii,f,v){sheets[si].items[ii][f]=f==='vendor'?v:(parseFloat(v)||0);render();saveData()}
function updateName(si,ii,v){sheets[si].items[ii].g=v.trim();saveData()}
function addItem(si){sheets[si].items.push({g:"新品項",spec:"",artists:[{n:"（美工名）",fee:0}],sel:null,price:0,qty:0,print:0,shipping:0,vendor:""});render();saveData()}
function delItem(si,ii){sheets[si].items.splice(ii,1);render();saveData()}
function updMisc(si,fi,f,v){sheets[si].miscFees[fi][f]=f==='amt'?parseFloat(v)||0:v;render();saveData()}
function addMisc(si){sheets[si].miscFees.push({name:"新費用",amt:0});render();saveData()}
function delMisc(si,fi){sheets[si].miscFees.splice(fi,1);render();saveData()}
function resetSheet(si){
  if(!confirm(`清除「${sheets[si].title}」所有數據？品項名稱同美工選項會保留，數字會歸零。`))return;
  const s=sheets[si];s.feeBase=0;s.miscFees.forEach(f=>f.amt=0);
  s.items.forEach(it=>{it.sel=null;it.price=0;it.qty=0;it.print=0;it.shipping=0;it.vendor="";});
  render();saveData();
}
function openArtistEditor(si,ii){aeTarget={si,ii};renderAeRows();document.getElementById('artist-editor').classList.add('open')}
function closeArtistEditor(){document.getElementById('artist-editor').classList.remove('open');render();saveData()}
function renderAeRows(){
  const it=sheets[aeTarget.si].items[aeTarget.ii];
  document.getElementById('ae-rows').innerHTML=it.artists.map((ar,ai)=>`
    <div class="ae-row">
      <input class="ae-name" type="text" value="${ar.n}" onchange="aeUpdName(${ai},this.value)" placeholder="美工名稱">
      <span style="font-size:12px;color:#aaa">$</span>
      <input class="ae-fee" type="number" min="0" step="any" value="${ar.fee||''}" placeholder="0" onchange="aeUpdFee(${ai},this.value)">
      ${it.artists.length>1?`<button class="del-btn" onclick="aeDelArtist(${ai})">✕</button>`:'<div style="width:24px"></div>'}
    </div>`).join('');
}
function aeUpdName(ai,v){sheets[aeTarget.si].items[aeTarget.ii].artists[ai].n=v}
function aeUpdFee(ai,v){sheets[aeTarget.si].items[aeTarget.ii].artists[ai].fee=parseFloat(v)||0}
function aeDelArtist(ai){
  const it=sheets[aeTarget.si].items[aeTarget.ii];
  if(it.artists.length<=1)return;
  if(it.sel===ai)it.sel=null;
  else if(it.sel!==null&&it.sel>ai)it.sel--;
  it.artists.splice(ai,1);renderAeRows();
}
function aeAddRow(){sheets[aeTarget.si].items[aeTarget.ii].artists.push({n:"新美工",fee:0});renderAeRows()}

render();
saveData();
</script>
</body>
</html>
